<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新巴赫花精大全｜總覽</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => initHomePage());</script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">總覽</p>
      <h1>新巴赫花精大全</h1>
      <p>快速進入判斷、查詢與個人重點花精。</p>
    </div>
  </header>

  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>

    <section class="home-overview-section">
      <div class="overview-grid">
        <a class="overview-card" href="flowers.html">
          <span class="overview-kicker">查詢</span>
          <h2>查詢花精</h2>
          <p>用名稱、英文名、分類、負面狀態或正面方向搜尋，快速找到需要複習的花精。</p>
        </a>
        <a class="overview-card" href="decision.html">
          <span class="overview-kicker">判斷</span>
          <h2>判斷目前狀況</h2>
          <p>用情緒與反應模式反推可能需要的花精，再回到花精卡片確認細節。</p>
        </a>
      </div>
    </section>

    <section class="home-focus-section">
      <div class="home-focus-tools">
        <div>
          <p class="eyebrow">個人紀錄</p>
          <h2>重點花精</h2>
          <p>這裡顯示「個人紀錄」中收藏的花精摘要。要新增或管理備註與匹配程度，請到花精總表或個人紀錄頁。</p>
        </div>
        <p class="record-actions">
          <a class="button" href="flowers.html">查詢並加入花精</a>
          <a class="small-button" href="records.html">管理個人紀錄</a>
        </p>
      </div>
      <div class="home-focus-results">
        <div id="focusList" class="focus-list" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>同步設定在右上角。</p>
  </footer>
</body>
</html>
