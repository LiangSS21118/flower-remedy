<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新巴赫花精大全｜身體地圖查詢</title>
  <link rel="stylesheet" href="styles.css?v=20260723-83">
  <script src="body-map-data.js?v=20260723-82" defer></script>
  <script src="body-map-points.js?v=20260723-82" defer></script>
  <script src="body-map-point-overrides.js?v=20260723-82" defer></script>
  <script src="body-map-point-official-overrides.js?v=20260723-82" defer></script>
  <script src="data.js?v=20260723-82" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => initBodyMapPage());</script>
</head>
<body>
  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>

    <section class="body-map-section">
      <div class="section-heading">
        <p class="eyebrow">身體反應區</p>
      </div>

      <section class="reaction-map-app" aria-label="花精身體反應區互動表">
        <div class="reaction-toolbar">
          <label class="field reaction-search-field">
            <span>搜尋花精或部位</span>
            <input id="bodyReactionSearch" type="search" placeholder="例如：右肩、生殖器、白楊、背部">
          </label>
        </div>

        <div class="reaction-stats" id="bodyReactionStats" aria-live="polite"></div>

        <div class="reaction-map-layout">
          <div class="body-map-stage" aria-label="可互動身體地圖">
            <div class="body-toggle-row">
              <div class="body-view-toggle body-segment-toggle" aria-label="切換身體前側後側">
                <button class="small-button active" type="button" data-body-view="front">前側</button>
                <button class="small-button" type="button" data-body-view="back">後側</button>
              </div>
              <div class="body-gender-toggle body-segment-toggle" aria-label="切換男女身體圖">
                <button class="small-button active" type="button" data-body-gender="female">女</button>
                <button class="small-button" type="button" data-body-gender="male">男</button>
              </div>
            </div>

            <figure class="body-figure" data-active-view="front">
              <figcaption id="bodyFigureCaption">女｜前側</figcaption>
              <div class="body-figure-canvas">
                <img id="bodyFigureImage" src="peo/1.png" alt="女身體前側參考圖">
                <div id="bodyHotspots" class="body-hotspot-layer" aria-label="身體反應點"></div>
              </div>
            </figure>
          </div>

          <aside class="body-map-panel reaction-preview-panel body-map-modal" id="bodyMapPanel" aria-live="polite" aria-label="身體反應點結果" hidden>
            <div class="body-map-modal-header">
              <h2 id="bodyMapTitle">請點選身體反應點</h2>
              <button class="body-map-modal-close" type="button" data-close-body-panel aria-label="關閉反應點結果">×</button>
            </div>
            <p id="bodyMapDescription">黑點代表目前篩選條件下的反應區。點擊後可查看花精與原始參考圖。</p>
            <div id="bodyReactionResults" class="reaction-result-list compact"></div>
          </aside>
        </div>
      </section>
    </section>

  </main>
</body>
</html>
