<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>巴赫花精整理筆記｜急救花精</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => renderNav("rescue.html"));</script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">急救花精</p>
      <h1>急救花精</h1>
      <p>五花組合，用於課程中提到的緊急心理狀態與生理傷害情境。</p>
    </div>
  </header>
  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>
    <section>
      <h2>五花組合</h2>
      <p>急救花精是五花組合，課程中整理為適合「緊急心理狀態」或「生理傷害」時參考，例如驚嚇、打擊、恐懼、噩耗、意外、生病、昏迷等。</p>
      <div class="table-wrap">
        <table>
          <thead><tr><th>花精</th><th>對應狀態</th></tr></thead>
          <tbody>
            <tr><td>伯利恆之星 Star of Bethlehem</td><td>驚嚇、心靈受創、需要安慰</td></tr>
            <tr><td>岩薔薇 Rock Rose</td><td>恐慌、極度害怕、動彈不得</td></tr>
            <tr><td>櫻桃李 Cherry Plum</td><td>快抓狂、精神壓力大、害怕失控</td></tr>
            <tr><td>鐵線蓮 Clematis</td><td>昏沉、失去意識、不在當下</td></tr>
            <tr><td>鳳仙花 Impatiens</td><td>急躁、緊繃、疼痛時的焦躁</td></tr>
          </tbody>
        </table>
      </div>
      <p class="note"><strong>注意事項：</strong>急救花精不能在手術麻醉前使用。</p>
    </section>
  </main>
</body>
</html>
