<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新巴赫花精大全｜十二個花精軌道</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => renderNav("tracks.html"));</script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">十二花軌</p>
      <h1>十二個花精軌道</h1>
      <p>這一頁先保留給之後的花精軌道資料。未來可以整理每一條軌道的核心主題、對應花精、情緒模式與複習提示。</p>
    </div>
  </header>

  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>

    <section>
      <div class="section-heading">
        <p class="eyebrow">整理架構</p>
        <h2>預計整理方式</h2>
      </div>
      <div class="placeholder-grid">
        <article>
          <h3>軌道主題</h3>
          <p>每一條軌道用一句話說明主要情緒課題，讓初學者先抓方向。</p>
        </article>
        <article>
          <h3>對應花精</h3>
          <p>列出該軌道內的花精，並連回 38 朵花精卡片查詳細狀態。</p>
        </article>
        <article>
          <h3>複習提示</h3>
          <p>補上常見判斷線索、容易混淆的花精，以及可以觀察自己的問題。</p>
        </article>
      </div>
    </section>

    <section>
      <h2>待補資料</h2>
      <p class="empty-state">目前尚未加入十二個花精軌道的正式資料。之後你提供課程筆記、截圖或整理內容時，我會把它轉成這個頁面的互動表或卡片。</p>
    </section>
  </main>
</body>
</html>
