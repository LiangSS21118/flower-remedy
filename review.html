<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>巴赫花精整理筆記｜複習建議</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => renderNav("review.html"));</script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">複習</p>
      <h1>複習建議</h1>
      <p>用簡單順序複習分類、查表與自我覺察。</p>
    </div>
  </header>
  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>
    <section>
      <h2>整理與複習</h2>
      <ul class="tips">
        <li>若要快速背誦：先背七大分類，再背每類有哪些花精。</li>
        <li>若要自我覺察：每天選一個最明顯的情緒狀態，對照總表。</li>
        <li>若要做課程筆記：可以在每朵花精後面補上自己的例子，例如「我什麼時候會像這朵花的狀態」。</li>
      </ul>
    </section>
  </main>
</body>
</html>
