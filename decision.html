<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新巴赫花精大全｜判斷</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => initDecisionPage());</script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">個人判斷</p>
      <h1>判斷目前狀況</h1>
      <p>依照最近兩週到一個月的實際狀態回答問題，逐步找出目前較接近的情緒方向與候選花精。</p>
    </div>
  </header>
  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>
    <section>
      <div class="section-heading">
        <p class="eyebrow">引導式判斷</p>
        <h2>一題一題釐清真正原因</h2>
        <p>這不是人格分類，也不是醫療或心理診斷。每題請選最接近的狀態；如果兩個都像，先選最近最強烈、最常出現，或最影響生活的那一個。</p>
      </div>
      <div class="decision-quiz" id="decisionQuiz">
        <div class="decision-progress" id="decisionProgress"></div>
        <div class="decision-question" id="decisionQuestion"></div>
        <div class="decision-options" id="decisionOptions"></div>
        <div class="decision-controls">
          <button class="small-button" type="button" id="decisionBack">上一題</button>
          <button class="small-button" type="button" id="decisionRestart">重新判斷</button>
        </div>
      </div>
    </section>

    <section id="decisionResult" aria-live="polite">
    </section>

    <section>
      <div class="section-heading">
        <p class="eyebrow">判斷原則</p>
        <h2>結果是線索，不是標籤</h2>
        <p>同一句話可能對應不同花精，請把結果當成候選方向。真正選花時，仍要回到具體事件、真正原因、強度與後續變化確認。</p>
      </div>
      <div class="decision-checklist">
        <p><strong>目前狀態：</strong>最近兩週到一個月最明顯。</p>
        <p><strong>真正原因：</strong>不是只看關鍵字，要追問為什麼。</p>
        <p><strong>可多朵並存：</strong>不同情境可能需要不同花精。</p>
        <p><strong>需要追蹤：</strong>記錄後再觀察情緒是否改變。</p>
      </div>
    </section>
  </main>
</body>
</html>
