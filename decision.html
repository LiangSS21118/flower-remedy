<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>巴赫花精整理筆記｜判斷流程</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => renderNav("decision.html"));</script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">選花精流程</p>
      <h1>簡易判斷流程</h1>
      <p>先整理自己的狀態，再對應可能需要的花精。</p>
    </div>
  </header>
  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>
    <section>
      <h2>選花精的判斷流程</h2>
      <ol class="steps">
        <li>先問：我現在最明顯的是哪一類情緒？害怕？不確定？不在當下？孤單？容易被影響？絕望？過度關心別人？</li>
        <li>再看：這個狀態比較像哪一朵花的描述？例如「怕具體事情」偏向溝酸漿，「莫名害怕」偏向白楊。</li>
        <li>最後看：我想要回到哪個正面方向？例如「信任自己的判斷」、「選擇希望」、「安穩思緒」。</li>
      </ol>
    </section>
  </main>
</body>
</html>
