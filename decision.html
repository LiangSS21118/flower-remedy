<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新巴赫花精大全｜判斷</title>
  <link rel="stylesheet" href="styles.css">
  <script src="data.js" defer></script>
  <script defer>document.addEventListener("DOMContentLoaded", () => initDecisionPage());</script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">個人判斷</p>
      <h1>判斷目前狀況</h1>
      <p>先選出最接近的情緒狀態，再查看候選花精。判斷後可以先加入個人紀錄，之後再補備註與匹配程度。</p>
    </div>
  </header>
  <main class="page">
    <nav class="nav" data-nav aria-label="筆記頁面"></nav>
    <section>
      <div class="section-heading">
        <p class="eyebrow">第一步</p>
        <h2>目前最明顯的是哪一類狀態？</h2>
      </div>
      <div class="decision-buttons">
        <button class="small-button" type="button" data-decision-category="恐懼">恐懼</button>
        <button class="small-button" type="button" data-decision-category="不確定">不確定</button>
        <button class="small-button" type="button" data-decision-category="對現況不感興趣">對現況不感興趣</button>
        <button class="small-button" type="button" data-decision-category="孤單">孤單</button>
        <button class="small-button" type="button" data-decision-category="易受外界影響">易受外界影響</button>
        <button class="small-button" type="button" data-decision-category="沮喪、絕望">沮喪、絕望</button>
        <button class="small-button" type="button" data-decision-category="過度牽掛別人的安康">過度牽掛別人的安康</button>
      </div>
    </section>

    <section id="decisionResult" aria-live="polite">
    </section>
  </main>
</body>
</html>
